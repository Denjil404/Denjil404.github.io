<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../../assets/images/ui/logosmall.png">
    <link rel="apple-touch-icon" href="../../assets/images/ui/logosmall.png">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <nav class="game-page-nav">
        <div class="mobile-nav-header">
            <a class="game-back-link" href="../../index.html#prototypes">&larr; Back</a>
        </div>
        <ul class="nav-links">
            <li><a href="../../index.html#prototypes">&larr; Back to Portfolio</a></li>
        </ul>
    </nav>

    <div class="game-container">
        <h1 id="game-name" class="game-main-title"></h1>

        <div class="slideshow-container" id="slideshow-container">
            <!-- Slides will be inserted here by JavaScript -->
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>

        <div class="game-header">
            <div class="game-description" id="game-description"></div>
        </div>
    </div>

    <!-- The Modal -->
    <div id="myModal" class="game-modal">
        <span class="game-modal-close" onclick="closeModal()">&times;</span>
        <a class="prev" onclick="changeModalImage(-1)">&#10094;</a>
        <a class="next" onclick="changeModalImage(1)">&#10095;</a>
        <div class="game-modal-content">
            <img id="modal-img" src="" alt="Zoomed Image">
        </div>
        <div class="game-modal-indicator" id="game-modal-indicator" aria-label="Image position indicator"></div>
    </div>

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="../../assets/js/game-modal.js"></script>
</body>
</html>
